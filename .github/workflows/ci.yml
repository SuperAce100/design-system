name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

  registry-build:
    name: Registry Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build registry
        run: bun run registry:build

      - name: Verify generated registry files are committed
        run: |
          git diff --exit-code -- public/r || {
            echo "Generated registry files differ from committed files.";
            echo "Run: bun run registry:build and commit updates.";
            exit 1;
          }

      - name: Upload registry artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registry-json
          path: public/r
